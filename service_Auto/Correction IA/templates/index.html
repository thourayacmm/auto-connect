<!DOCTYPE html>
<html>
<head>
<title>Text Corrector</title>

<style>
body{
font-family: Arial;
margin:40px;
background:#f4f4f4;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
}

.result{
margin-top:20px;
padding:15px;
background:white;
border-radius:5px;
}
</style>

</head>
<body>

<h2>Grammar Corrector</h2>

<textarea id="textInput" placeholder="Write text..."></textarea>
<br>
<button onclick="correctText()">Correct</button>

<div class="result">
<h3>Corrected Text</h3>
<p id="result"></p>
</div>

<script>

async function correctText(){

let text = document.getElementById("textInput").value

let formData = new FormData()
formData.append("text", text)

let response = await fetch("/correct_api",{
method:"POST",
body:formData
})

let data = await response.json()

document.getElementById("result").innerText = data.corrected
}

</script>

</body>
</html>
