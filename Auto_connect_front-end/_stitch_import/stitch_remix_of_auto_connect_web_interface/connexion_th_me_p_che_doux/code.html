<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Auto Connect - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#563400",
                        "primary-fixed-dim": "#658eff",
                        "on-error": "#ffefee",
                        "secondary": "#006947",
                        "on-primary-fixed-variant": "#00266e",
                        "primary": "#0050d4",
                        "on-tertiary-container": "#4a2c00",
                        "on-tertiary": "#fff0e3",
                        "surface-bright": "#fff5ed",
                        "on-tertiary-fixed": "#2a1700",
                        "inverse-primary": "#618bff",
                        "on-surface-variant": "#575c60",
                        "inverse-surface": "#0a0f12",
                        "on-secondary-fixed": "#00452d",
                        "on-background": "#2a2f32",
                        "secondary-dim": "#005c3d",
                        "surface-dim": "#ced5db",
                        "on-secondary-container": "#005a3c",
                        "on-secondary-fixed-variant": "#006544",
                        "on-primary": "#f1f2ff",
                        "on-secondary": "#c8ffe0",
                        "surface-container-low": "#fdf8f4",
                        "background": "#fff5ed",
                        "surface-tint": "#0050d4",
                        "tertiary-fixed": "#f8a010",
                        "surface-variant": "#eee5de",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#e79400",
                        "surface-container-highest": "#d7dee3",
                        "surface-container-high": "#dde3e8",
                        "tertiary": "#815100",
                        "error": "#b31b25",
                        "primary-fixed": "#7b9cff",
                        "secondary-fixed-dim": "#58e7ab",
                        "secondary-container": "#69f6b8",
                        "primary-container": "#7b9cff",
                        "error-container": "#fb5151",
                        "surface": "#fff5ed",
                        "tertiary-container": "#f8a010",
                        "surface-container": "#f9f0e8",
                        "secondary-fixed": "#69f6b8",
                        "on-surface": "#2a2f32",
                        "on-primary-fixed": "#000000",
                        "tertiary-dim": "#714600",
                        "on-primary-container": "#001e5a",
                        "error-dim": "#9f0519",
                        "outline-variant": "#a9aeb1",
                        "inverse-on-surface": "#999da1",
                        "primary-dim": "#0046bb",
                        "on-error-container": "#570008",
                        "outline": "#73777b"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vitality-gradient {
            background: linear-gradient(135deg, #2563EB 0%, #60A5FA 100%);
        }
        .soft-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }</style>
</head>
<body class="bg-[#fff5ed] text-on-background min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-tertiary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary-container/5 rounded-full blur-[150px]"></div>
<!-- Main Login Shell -->
<main class="w-full max-w-[480px] z-10">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-lg mb-6 shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<h1 class="text-4xl font-extrabold text-[#2563EB] tracking-tight mb-2">Auto Connect</h1>
<p class="text-on-surface-variant font-medium">L'interface AAC qui vous comprend.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-10 shadow-[0_20px_60px_rgba(129,81,0,0.08)] border border-white/50">
<header class="mb-8">
<h2 class="text-2xl font-bold text-on-surface mb-1">Bienvenue</h2>
<p class="text-on-surface-variant text-sm">Veuillez vous connecter pour accéder à votre espace.</p>
</header>
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-low border border-surface-variant/50 rounded-lg text-on-surface placeholder:text-outline/60 focus:ring-4 focus:ring-primary-fixed-dim/30 transition-all font-body" id="email" name="email" placeholder="nom@exemple.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant" for="password">Mot de passe</label>
<a class="text-[0.6875rem] font-bold text-primary hover:text-primary-dim transition-colors uppercase tracking-wider" href="#">Mot de passe oublié</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-surface-container-low border border-surface-variant/50 rounded-lg text-on-surface placeholder:text-outline/60 focus:ring-4 focus:ring-primary-fixed-dim/30 transition-all font-body" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<button class="text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Action Button -->
<button class="vitality-gradient w-full py-4 px-6 rounded-full text-on-primary font-bold text-lg shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-blue-600/20" type="submit">
                    Se connecter
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer / Signup Link -->
<footer class="mt-10 pt-8 border-t border-surface-container-high text-center">
<p class="text-on-surface-variant text-sm">
                    Nouveau sur Auto Connect ? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Créer un compte</a>
</p>
</footer>
</div>
<!-- Trust / Accessibility Footer -->
<div class="mt-8 flex items-center justify-center gap-8 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[0.6875rem] font-bold uppercase tracking-widest">Sécurisé</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="accessibility_new">accessibility_new</span>
<span class="text-[0.6875rem] font-bold uppercase tracking-widest">Inclusif</span>
</div>
</div>
</main>
<!-- Decorative Illustration Element -->
</body></html>
