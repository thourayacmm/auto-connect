<body class="min-h-screen pb-32">
<!-- Top Navigation Bar -->
<header class="bg-[#fff1e8] w-full top-0 px-6 py-4 flex justify-between items-center max-w-screen-2xl mx-auto z-50">
<div class="text-2xl font-bold text-[#006591]">Tactile Sanctuary</div>
<div class="flex items-center gap-4">

<div class="flex gap-2">
<button class="p-2 rounded-full hover:bg-[#fdebde] transition-colors"><span class="material-symbols-outlined text-[#006591]" data-icon="sentiment_very_satisfied">sentiment_very_satisfied</span></button>

</div>

<main class="max-w-screen-xl mx-auto px-6 py-8 space-y-8">

</div>

</div>
<div class="flex flex-col items-center min-w-[70px]">

</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-secondary-container">LIKE</span>
</div>
<div class="flex flex-col items-center min-w-[70px]">
<div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center mb-1">
<div class="w-6 h-6 bg-blue-500 rounded-full"></div>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-blue-600">BLUE</span>
</div>

<div class="flex gap-3 pr-2">
<button class="flex flex-col items-center justify-center bg-gradient-to-br from-[#006591] to-[#0073a5] text-white rounded-full h-16 w-16 shadow-lg active:scale-90 transition-all">

</button>

<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
<span class="text-[9px] font-bold mt-1">CLEAR</span>
</button>

<span class="material-symbols-outlined" data-icon="delete">delete</span>
<span class="text-[9px] font-bold mt-1">DELETE</span>
</button>
</div>
</section>

<span class="material-symbols-outlined text-purple-500" data-icon="theater_comedy">theater_comedy</span>
<span class="text-sm font-medium">Sarcastic</span>
</button>
</div>

<span class="font-bold text-on-surface">Colours</span>
